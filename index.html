<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA Maquettes Web</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 400px 1fr;
    }

    .sidebar {
      background: #020617;
      padding: 30px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    h1 {
      margin-top: 0;
      font-size: 30px;
    }

    p {
      color: #94a3b8;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-top: 18px;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: #0f172a;
      color: white;
      font-size: 15px;
      outline: none;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .secondary {
      background: #1e293b;
    }

    .preview-zone {
      background: #e5e7eb;
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 40px);
      background: white;
      border: none;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .message {
      margin-top: 15px;
      color: #cbd5e1;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      iframe {
        height: 700px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="sidebar">
      <h1>IA de maquettes web</h1>
      <p>
        Décris le site que tu veux créer. L’IA génère une maquette HTML/CSS que tu peux copier ou télécharger.
      </p>

      <label>Secteur du site</label>
      <input id="secteur" placeholder="Ex : restaurant, coach sportif, immobilier..." />

      <label>Style</label>
      <select id="style">
        <option value="moderne, premium, minimaliste">Moderne premium</option>
        <option value="luxe, sombre, élégant">Luxe sombre</option>
        <option value="jeune, coloré, dynamique">Jeune et dynamique</option>
        <option value="professionnel, sérieux, corporate">Professionnel corporate</option>
        <option value="e-commerce, vendeur, conversion">E-commerce vendeur</option>
      </select>

      <label>Demande client</label>
      <textarea id="prompt" placeholder="Ex : Crée une maquette pour un salon de coiffure moderne avec prestations, avis clients, réservation et ambiance premium..."></textarea>

      <button id="generateBtn">Créer la maquette</button>
      <button class="secondary" id="copyBtn">Copier le code</button>
      <button class="secondary" id="downloadBtn">Télécharger la maquette</button>

      <div class="message" id="message"></div>
    </div>

    <div class="preview-zone">
      <iframe id="preview"></iframe>
    </div>
  </div>

  <script>
    const generateBtn = document.getElementById("generateBtn");
    const copyBtn = document.getElementById("copyBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const message = document.getElementById("message");
    const preview = document.getElementById("preview");

    let currentHTML = "";

    generateBtn.addEventListener("click", async () => {
      const secteur = document.getElementById("secteur").value.trim();
      const style = document.getElementById("style").value;
      const prompt = document.getElementById("prompt").value.trim();

      if (!prompt) {
        message.textContent = "Décris d'abord la maquette que tu veux créer.";
        return;
      }

      generateBtn.disabled = true;
      generateBtn.textContent = "Génération...";
      message.textContent = "L’IA prépare ta maquette.";

      try {
        const response = await fetch("/api/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            secteur,
            style,
            prompt
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Erreur pendant la génération.");
        }

        currentHTML = data.html;
        preview.srcdoc = currentHTML;
        message.textContent = "Maquette générée avec succès.";
      } catch (error) {
        message.textContent = error.message;
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = "Créer la maquette";
      }
    });

    copyBtn.addEventListener("click", async () => {
      if (!currentHTML) {
        message.textContent = "Aucune maquette à copier.";
        return;
      }

      await navigator.clipboard.writeText(currentHTML);
      message.textContent = "Code copié.";
    });

    downloadBtn.addEventListener("click", () => {
      if (!currentHTML) {
        message.textContent = "Aucune maquette à télécharger.";
        return;
      }

      const blob = new Blob([currentHTML], { type: "text/html" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = "maquette-site.html";
      link.click();

      URL.revokeObjectURL(url);
      message.textContent = "Maquette téléchargée.";
    });
  </script>
</body>
</html>
